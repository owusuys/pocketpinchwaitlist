name = "pocketpinch-waitlist"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_SITE_URL = "https://pocketpinch.ntafostudios.com"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
