<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Returning to PocketPinch…</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0b0f; color: #f5f5f7; text-align: center; padding: 24px;
    }
    .card { max-width: 360px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 20px;
      border: 3px solid rgba(255,255,255,0.15); border-top-color: #16A34A;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 19px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #a1a1aa; margin: 0 0 20px; }
    a.btn {
      display: inline-block; padding: 12px 22px; border-radius: 12px;
      background: #16A34A; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Finishing up…</h1>
    <p>Taking you back to PocketPinch to complete your bank connection.</p>
    <a class="btn" id="openApp" href="#">Open PocketPinch</a>
  </div>

  <script>
    // Plaid appends its OAuth params (e.g. oauth_state_id) to this redirect URI.
    // On a device with the app installed, iOS intercepts this Universal Link
    // (applinks:pocketpinch.ntafostudios.com) and reopens the app directly —
    // this page is the fallback if that interception does not fire.
    (function () {
      var search = window.location.search || "";
      // Custom-scheme fallback that carries the original OAuth query through to the app.
      var appUrl = "pocketpinch://oauth" + search;
      var btn = document.getElementById("openApp");
      btn.setAttribute("href", appUrl);
      // Attempt an automatic hand-off to the app.
      window.location.href = appUrl;
    })();
  </script>
</body>
</html>
